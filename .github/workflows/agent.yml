name: AI Agent - Tu dong viet bai

on:
  schedule:
    # Chay luc 7h, 13h, 19h gio Viet Nam (UTC 0h, 6h, 12h)
    - cron: '0 0,6,12 * * *'
  workflow_dispatch:  # Cho phep chay bang tay

jobs:
  write-article:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHPAT }}
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run AI Agent
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIAKEY }}
        run: |
          python agent.py

      - name: Commit and push
        run: |
          git config user.email "agent@ninhhoa.blog"
          git config user.name "AI Agent"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "AI agent: auto commit $(date +'%Y-%m-%d %H:%M')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GHPAT }}